<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Minecraft Web</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    overflow:hidden;
    background:#87CEEB;
}

canvas{
    display:block;
    width:100vw;
    height:100vh;
}

.hud{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:12px;
    border-radius:10px;
    backdrop-filter:blur(5px);
}

.hud h1{
    color:#7CFC00;
    margin-bottom:5px;
}

.crosshair{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:30px;
    font-weight:bold;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="hud">
    <h1>⛏ MINI CRAFT WEB</h1>
    <p>WASD = mover</p>
    <p>ESPACIO = saltar</p>
    <p>Click izquierdo = colocar bloque</p>
    <p>Click derecho = romper bloque</p>
</div>

<div class="crosshair">+</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const TILE = 40;
const GRAVITY = 0.7;

const world = [];
const cols = Math.ceil(canvas.width / TILE);
const rows = Math.ceil(canvas.height / TILE);

// CREAR MUNDO
for(let y=0;y<rows;y++){
    world[y] = [];

    for(let x=0;x<cols;x++){

        if(y > rows/2){
            world[y][x] = "dirt";
        }
        else if(y === Math.floor(rows/2)){
            world[y][x] = "grass";
        }
        else{
            world[y][x] = null;
        }

    }
}

// JUGADOR
const player = {
    x: 100,
    y: 100,
    w: 32,
    h: 50,
    velX: 0,
    velY: 0,
    speed: 5,
    jumping: false
};

const keys = {};

// TECLADO
window.addEventListener("keydown", e=>{

    keys[e.key.toLowerCase()] = true;

    if(e.code === "Space" && !player.jumping){
        player.velY = -13;
        player.jumping = true;
    }

});

window.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
});

// COLOCAR BLOQUES
canvas.addEventListener("click", e=>{

    const rect = canvas.getBoundingClientRect();

    const mx = Math.floor((e.clientX - rect.left)/TILE);
    const my = Math.floor((e.clientY - rect.top)/TILE);

    if(world[my][mx] === null){
        world[my][mx] = "grass";
    }

});

// ROMPER BLOQUES
canvas.addEventListener("contextmenu", e=>{

    e.preventDefault();

    const rect = canvas.getBoundingClientRect();

    const mx = Math.floor((e.clientX - rect.left)/TILE);
    const my = Math.floor((e.clientY - rect.top)/TILE);

    world[my][mx] = null;

});

// FONDO
function drawBackground(){

    const gradient = ctx.createLinearGradient(0,0,0,canvas.height);

    gradient.addColorStop(0,"#6EC6FF");
    gradient.addColorStop(1,"#DFF6FF");

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // SOL
    ctx.fillStyle = "#FFD93D";

    ctx.beginPath();
    ctx.arc(120,120,60,0,Math.PI*2);
    ctx.fill();

    // NUBES
    ctx.fillStyle = "white";

    ctx.fillRect(250,100,120,40);
    ctx.fillRect(500,150,150,45);
    ctx.fillRect(800,80,100,35);
}

// MUNDO
function drawWorld(){

    for(let y=0;y<rows;y++){

        for(let x=0;x<cols;x++){

            if(world[y][x]){

                if(world[y][x] === "grass"){

                    ctx.fillStyle = "#3CB043";

                }else{

                    ctx.fillStyle = "#8B4513";

                }

                ctx.fillRect(x*TILE,y*TILE,TILE,TILE);

                // DETALLE
                ctx.strokeStyle = "rgba(0,0,0,0.2)";
                ctx.strokeRect(x*TILE,y*TILE,TILE,TILE);

            }

        }

    }

}

// PERSONAJE
function drawPlayer(){

    // CUERPO
    ctx.fillStyle = "#1E90FF";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    // CABEZA
    ctx.fillStyle = "#FFD39B";
    ctx.fillRect(player.x+6,player.y+5,20,20);

    // OJOS
    ctx.fillStyle = "black";
    ctx.fillRect(player.x+10,player.y+12,3,3);
    ctx.fillRect(player.x+20,player.y+12,3,3);

}

// ACTUALIZAR
function update(){

    player.velX = 0;

    if(keys["a"]){
        player.velX = -player.speed;
    }

    if(keys["d"]){
        player.velX = player.speed;
    }

    player.x += player.velX;

    // GRAVEDAD
    player.velY += GRAVITY;
    player.y += player.velY;

    // SUELO
    let ground = (rows/2)*TILE - player.h;

    if(player.y > ground){

        player.y = ground;
        player.velY = 0;
        player.jumping = false;

    }

    // LIMITES
    if(player.x < 0){
        player.x = 0;
    }

    if(player.x + player.w > canvas.width){
        player.x = canvas.width - player.w;
    }

}

// LOOP
function gameLoop(){

    drawBackground();

    update();

    drawWorld();

    drawPlayer();

    requestAnimationFrame(gameLoop);

}

gameLoop();
</script>

</body>
</html>
